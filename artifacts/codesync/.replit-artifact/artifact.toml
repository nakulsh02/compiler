kind = "web"
previewPath = "/"
title = "CodeSync - Collaborative Code Editor"
version = "1.0.0"
id = "artifacts/codesync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25034

[services.development]
run = "pnpm --filter @workspace/codesync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/codesync", "run", "build" ]
publicDir = "artifacts/codesync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25034"
BASE_PATH = "/"
